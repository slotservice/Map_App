name: mapapp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mapapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mapapp_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-mapapp_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mapapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mapapp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mapapp_dev_only}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-mapapp} ${MINIO_ROOT_PASSWORD:-mapapp_dev_only} &&
      mc mb -p local/${MINIO_DEFAULT_BUCKET:-fcfm-photos-dev} || true &&
      mc anonymous set download local/${MINIO_DEFAULT_BUCKET:-fcfm-photos-dev}
      "

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_HTTP_PORT:-8025}:8025"

volumes:
  postgres-data:
  minio-data:
