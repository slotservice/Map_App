# Map App — Full Circle FM rebuild.
# IP-based + unknown-domain catchall on port 80; routes API + admin web
# behind a single front door so the browser never has to hit 3001/4000
# directly (those stay firewalled to localhost).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large Excel imports + photo uploads.
    client_max_body_size 25M;

    # API surface — anything under /api/v1, plus the health probes.
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location = /healthz { proxy_pass http://127.0.0.1:3001/healthz; }
    location = /readyz  { proxy_pass http://127.0.0.1:3001/readyz; }

    # Everything else → Next.js admin (with WebSocket upgrade for HMR).
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
